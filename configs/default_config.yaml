# default_config.yaml
# YAML configuration for NeuroBIDS-Flow
# Users can copy and customize this for their own dataset
# ── Dataset Info ──────────────────────────────────────────
dataset:
  name: "My EEG Dataset"
  authors: ["Your Name"]
  institution: "Your Institution"
  ethics_approval: "IRB-XXXX"

# ── Recording Info ────────────────────────────────────────
recording:
  task: "ssvep"
  power_line_freq: 50.0      # 50 for Asia/Europe, 60 for USA
  subject_prefix: "sub"
  session_prefix: "ses"

# ── Event Mapping ──────────────────────────────────────────────────────────────
# Map hardware-specific marker codes → standard trial_type names
# Examples below cover common passive BCI paradigms across consumer EEG devices
# Add or modify mappings based on your experiment design
event_mapping:
  # Passive BCI — resting state
  "eyes_open":        "rest_open"
  "eyes_closed":      "rest_closed"
  "rest":             "rest"

  # Passive BCI — cognitive state
  "workload_low":     "cognitive_low"
  "workload_high":    "cognitive_high"
  "fatigue":          "fatigue"
  "alert":            "alert"

  # Passive BCI — emotion
  "valence_pos":      "emotion_positive"
  "valence_neg":      "emotion_negative"
  "arousal_high":     "arousal_high"
  "arousal_low":      "arousal_low"

  # Numeric codes (OpenBCI / Emotiv)
  "1":                "rest_open"
  "2":                "rest_closed"
  "3":                "cognitive_low"
  "4":                "cognitive_high"
  "99":               "rest"
  "0":                "rest"

# ── Hardware Overrides ────────────────────────────────────
# Override default hardware metadata if needed
hardware:
  sampling_rate: null        # null = auto-detect from file
  channel_count: null        # null = auto-detect from file
  reference_scheme: null     # null = use plugin default

# ── Output Settings ───────────────────────────────────────
output:
  overwrite: true
  validate_bids: true        # run BIDS validator after conversion
  verbose: false