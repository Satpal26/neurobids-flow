# default_config.yaml
# YAML configuration for NeuroBIDS-Flow
# Users can copy and customize this for their own dataset
# ── Dataset Info ──────────────────────────────────────────────────────────────
dataset:
  name: "My Passive BCI Study"
  authors: ["Your Name"]
  institution: "Your Institution"
  ethics_approval: "IRB-XXXX"

# ── Recording Info ────────────────────────────────────────────────────────────
recording:
  task: "workload"
  power_line_freq: 50.0      # 50 for Asia/Europe, 60 for USA
  subject_prefix: "sub"
  session_prefix: "ses"

# ── Event Mapping ─────────────────────────────────────────────────────────────
# Two supported formats:
#
# Simple (trial_type only):
#   "99": "rest"
#
# Extended (trial_type + HED semantic annotation):
#   "1":
#     trial_type: "rest_open"
#     hed: "Sensory-event, (Eyes, Open)"
#
# HED strings follow HED schema 8.2.0 — https://www.hedtags.org
# When ANY event has a "hed" field, NeuroBIDS-Flow will:
#   - Write events.json sidecar with full HED dictionary
#   - Inject "HEDVersion": "8.2.0" into dataset_description.json
# ──────────────────────────────────────────────────────────────────────────────

event_mapping:

  # ── Resting state ──────────────────────────────────────────────────────────
  "eyes_open":
    trial_type: "rest_open"
    hed: "Sensory-event, (Eyes, Open), Rest"

  "eyes_closed":
    trial_type: "rest_closed"
    hed: "Sensory-event, (Eyes, Closed), Rest"

  "rest":
    trial_type: "rest"
    hed: "Rest"

  # ── Cognitive workload ─────────────────────────────────────────────────────
  "workload_low":
    trial_type: "cognitive_low"
    hed: "Cognitive-effort, Task-difficulty/Low"

  "workload_high":
    trial_type: "cognitive_high"
    hed: "Cognitive-effort, Task-difficulty/High"

  "fatigue":
    trial_type: "fatigue"
    hed: "Cognitive-effort, (Fatigue, Mental)"

  "alert":
    trial_type: "alert"
    hed: "Cognitive-effort, Alertness/High"

  # ── Emotion ────────────────────────────────────────────────────────────────
  "valence_pos":
    trial_type: "emotion_positive"
    hed: "Emotional-event, Valence/Positive"

  "valence_neg":
    trial_type: "emotion_negative"
    hed: "Emotional-event, Valence/Negative"

  "arousal_high":
    trial_type: "arousal_high"
    hed: "Emotional-event, Arousal/High"

  "arousal_low":
    trial_type: "arousal_low"
    hed: "Emotional-event, Arousal/Low"

  # ── Numeric codes (OpenBCI / Emotiv) ───────────────────────────────────────
  "1":
    trial_type: "rest_open"
    hed: "Sensory-event, (Eyes, Open), Rest"

  "2":
    trial_type: "rest_closed"
    hed: "Sensory-event, (Eyes, Closed), Rest"

  "3":
    trial_type: "cognitive_low"
    hed: "Cognitive-effort, Task-difficulty/Low"

  "4":
    trial_type: "cognitive_high"
    hed: "Cognitive-effort, Task-difficulty/High"

  # ── Simple fallback codes (no HED needed) ──────────────────────────────────
  "99": "rest"
  "0":  "rest"

# ── Hardware Overrides ────────────────────────────────────────────────────────
hardware:
  sampling_rate: null        # null = auto-detect from file
  channel_count: null        # null = auto-detect from file
  reference_scheme: null     # null = use plugin default

# ── Output Settings ───────────────────────────────────────────────────────────
output:
  overwrite: true
  validate_bids: true
  verbose: false